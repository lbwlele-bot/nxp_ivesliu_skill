board: imx95evk19
adapter: FT4232H Quad HS USB-UART/FIFO IC
baudrate: 115200
format: 8N1
prefer_by_id: true
ports:
  first-runtime:
    by_id: usb-FTDI_Quad_RS232-HS-if00-port0
    tty: /dev/ttyUSB0
    description: First FTDI runtime port; can be hidden by ft_fta_sel after bcu -keep
  a55-rtos:
    by_id: usb-FTDI_Quad_RS232-HS-if02-port0
    tty: /dev/ttyUSB2
    description: A55 RTOS log observed in local case evidence
  cm33-smfw:
    by_id: usb-FTDI_Quad_RS232-HS-if03-port0
    tty: /dev/ttyUSB3
    description: CM33 or SMFW monitor observed in local case evidence
host_hazards:
  - bcu reset with -keep can leave ft_fta_sel high and suppress first-runtime output.
