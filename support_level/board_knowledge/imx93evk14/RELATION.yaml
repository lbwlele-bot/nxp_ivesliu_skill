schema_version: 1
id: imx93evk14
type: board_profile
human_doc: README.md
owner: board-exec

summary: i.MX93 14x14 EVK 板级事实入口，覆盖镜像写入形态、FAT 文件替换和 M33 串口线索。

relations:
  projects: []
  compile_targets: []
  software_stacks: []
  release_packages: []
  boards: []
  tools:
    - serial-console
    - uuu
    - bcu

case_required_for:
  - full_image_restore
  - fat_file_write
  - serial_log_capture
  - mcore_runtime_probe

warnings:
  - Full image restore and FAT file replacement are different risk classes.
  - Do not treat remoteproc stop as a default action.
  - This board supports BCU reset; do not inherit DXL role-specific reset constraints.
  - Follow the packaged imx93evk14 serial profile for interface roles and BCU channel 1 recovery.
  - UUU transfer success does not prove Linux or M33 runtime success.

