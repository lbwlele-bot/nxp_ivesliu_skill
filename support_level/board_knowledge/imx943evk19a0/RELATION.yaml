schema_version: 1
id: imx943evk19a0
type: board_profile
human_doc: README.md
owner: board-exec

summary: i.MX943 EVK 19x19 A0 板级事实入口，包含 bcu、uuu、串口和保留核约束。

relations:
  projects: []
  compile_targets: []
  software_stacks: []
  release_packages: []
  boards: []
  tools:
    - serial-console
    - uuu
    - bcu

case_required_for:
  - bcu_reset
  - boot_mode_change
  - uuu_transfer
  - serial_log_capture
  - mcore_payload_probe

warnings:
  - bcu is a strong board-state signal for this board, but it does not prove runtime success.
  - Confirm A0 versus B1 from FTDI EEPROM before reset; the profiles require opposite SW7-1 settings.
  - On the current A0 specimen, BCU GPIO access and reset fail even with SW7-1 ON; use physical power cycle until that path is repaired.
  - BCU hardware access can leave if01 unbound; recover it and require all four interfaces in a fresh probe.
  - m33_0 is a reserved SMFW core and must not be treated as a free case target.
  - ttyUSB3 is not the default Linux shell.
  - External application M-core UART adapters are separate from the on-board four-interface FT4232H profile.
  - Reset, uuu success, or serial silence cannot skip the boot-stage probe.

evidence:
  - README.md
  - serial.yaml
  - ../../tools/serial-console/USAGE.md
  - ../../tools/uuu/USAGE.md
  - ../../tools/bcu/USAGE.md
