summary: 通用 NXP i.MX U-Boot 源码线，提供 U-Boot 侧启动固件输入。

relations:
  projects:
    - real-time-edge-uboot
  compile_targets:
    - flashbin
  software_stacks:
    - rte
  release_packages: []
  boards: []
  tools: []

case_required_for:
  - patched_uboot
  - rebuilt_uboot
  - generated_uboot_input

warnings:
  - RTE tasks must not default to uboot-imx without checking whether real-time-edge-uboot is required.
  - U-Boot defconfig must be selected from SoC, board, package, DDR, boot media, and software stack.
  - U-Boot output alone is not a complete flash.bin.

evidence:
